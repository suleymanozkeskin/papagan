name: publish npm main

# One-shot workflow for publishing just the main `papagan` package to npm.
# The full release.yml workflow uses napi pre-publish which trips on the
# currently-blocked papagan-win32-x64-msvc name. This bypasses that entirely
# and just runs `npm publish --ignore-scripts` for the main package.

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: papagan-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Verify what will ship
        run: npm pack --dry-run
      - name: Publish main package
        run: npm publish --access public --ignore-scripts
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
