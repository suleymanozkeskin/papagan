name: release

# Publishes papagan to crates.io, PyPI, and npm when a version tag is pushed.
#
# Required repo secrets:
#   CARGO_REGISTRY_TOKEN  — crates.io API token
#   PYPI_API_TOKEN        — pypi.org API token (scope: project "papagan")
#   NPM_TOKEN             — npmjs.com automation token
#
# Trigger: `git tag v0.1.0 && git push --tags`  (or via workflow_dispatch to dry-run builds)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  # -----------------------------------------------------------------------
  # 1. Build Python wheels. maturin-action handles manylinux/musllinux
  #    containers automatically based on target triple.
  # -----------------------------------------------------------------------
  build-wheels:
    name: wheel (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux glibc
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          # Linux musl (Alpine)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          # macOS — arm64 runner, cross-compiles to x86_64 via Apple toolchain
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          command: build
          args: --release --out dist --manifest-path papagan-py/Cargo.toml
          manylinux: auto   # musl targets auto-use musllinux_1_2
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.target }}
          path: dist/*.whl

  # Source distribution (sdist) — lets users on niche platforms build from source.
  build-sdist:
    name: sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist --manifest-path papagan-py/Cargo.toml
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  # -----------------------------------------------------------------------
  # 2. Build Node native addons. Linux non-native targets cross-compile via
  #    zig (cargo-zigbuild) — sidesteps napi-rs's docker-image toolchain lag
  #    and handles all the weird glibc/musl/arch combos from a single x64
  #    Ubuntu runner.
  # -----------------------------------------------------------------------
  build-node:
    name: napi (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # Native builds
          - host: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            cross: false
          - host: macos-latest
            target: x86_64-apple-darwin
            cross: false
          - host: macos-latest
            target: aarch64-apple-darwin
            cross: false
          - host: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
          # Zig cross-compiled Linux
          - host: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            cross: true
          - host: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          - host: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
    runs-on: ${{ matrix.host }}
    defaults:
      run:
        working-directory: papagan-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: '. -> target'
      - name: Setup zig (for cross-compile)
        if: matrix.cross
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0
      - name: Install cargo-zigbuild
        if: matrix.cross
        run: cargo install --locked cargo-zigbuild
      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: |
          npm install --ignore-scripts
          npx napi build --release --platform --target ${{ matrix.target }}
      - name: Build (zig cross-compile)
        if: matrix.cross
        run: |
          npm install --ignore-scripts
          npx napi build --release --platform --target ${{ matrix.target }} --cross-compile
      - uses: actions/upload-artifact@v4
        with:
          name: napi-${{ matrix.target }}
          path: papagan-node/*.node

  # -----------------------------------------------------------------------
  # 3. Publish the core Rust crate. Source-only, one shot from Linux.
  #    Only runs on tag push, not on manual dispatch.
  # -----------------------------------------------------------------------
  publish-crate:
    name: publish → crates.io
    needs: [build-wheels, build-node, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Publish papagan
        run: cargo publish -p papagan --token "$CARGO_REGISTRY_TOKEN"
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # -----------------------------------------------------------------------
  # 4. Publish all collected wheels + sdist to PyPI.
  # -----------------------------------------------------------------------
  publish-pypi:
    name: publish → PyPI
    needs: [build-wheels, build-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install twine
      - run: twine upload --non-interactive --skip-existing dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}

  # -----------------------------------------------------------------------
  # 5. Publish the npm main package + platform-specific binary packages.
  #    The napi-rs CLI generates per-platform packages from the uploaded
  #    .node artifacts and publishes them alongside the main package.
  # -----------------------------------------------------------------------
  publish-npm:
    name: publish → npm
    needs: [build-node]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write   # napi pre-publish creates a GitHub release
    defaults:
      run:
        working-directory: papagan-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - run: npm install --ignore-scripts
      - uses: actions/download-artifact@v4
        with:
          pattern: napi-*
          path: papagan-node/artifacts
          merge-multiple: true
      - name: Move binaries into platform npm packages
        run: npx napi artifacts
      - name: Publish main + platform packages (creates GH release too)
        run: npx napi pre-publish -t npm --skip-optional-publish
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
